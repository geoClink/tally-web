name: Reset Demo Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --prefix /tmp/deps @supabase/supabase-js dotenv && cp -r /tmp/deps/node_modules ./node_modules_tmp
        # Use project node_modules if already installed, else install fresh
      - name: Run demo reset
        run: node supabase/reset-demo.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DEMO_EMAIL: ${{ secrets.VITE_DEMO_EMAIL }}
          VITE_DEMO_PASSWORD: ${{ secrets.VITE_DEMO_PASSWORD }}
