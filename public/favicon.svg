<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Clock face -->
  <circle cx="24" cy="24" r="22" fill="#2563eb"/>
  <circle cx="24" cy="24" r="20" fill="#0f172a"/>
  <!-- Hour markers -->
  <line x1="24" y1="6" x2="24" y2="9" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="39" x2="24" y2="42" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="24" x2="9" y2="24" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="39" y1="24" x2="42" y2="24" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="24" y1="24" x2="15" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="24" y1="24" x2="33" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="#2563eb"/>
</svg>
